# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

# Required
version: 2

# Set the OS, Python version, and other tools you might need
build:
  os: ubuntu-24.04
  tools:
    python: "3.13"
  jobs:
    create_environment:
      - asdf plugin add pixi || true
      - asdf install pixi latest
      - asdf global pixi latest
    install:
      - pixi install -e dev
    build:
      html:
        - NO_COLOR=1 pixi run -e dev mkdocs build --config-file properdocs.yml --site-dir "$READTHEDOCS_OUTPUT/html"

# Build documentation with ProperDocs
mkdocs:
  configuration: properdocs.yml
